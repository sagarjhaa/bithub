name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  build-binaries:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
            cc: gcc
            cxx: g++
          - os: ubuntu-24.04-arm
            platform: linux-arm64
            cc: gcc
            cxx: g++
          - os: macos-latest
            platform: macos-arm64
            cc: clang
            cxx: clang++

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake clang build-essential gcc g++ libomp-dev

      - name: Install build dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake libomp

      - name: Install Python build deps
        run: pip install "huggingface_hub[cli]"

      - name: Build bitnet.cpp
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
          BITNET_SKIP_MODEL_DOWNLOAD: "1"
        run: |
          chmod +x scripts/build-bitnet.sh
          ./scripts/build-bitnet.sh ./bitnet-build

      - name: Package binaries
        run: |
          mkdir -p dist
          cp ./bitnet-build/build/bin/llama-server dist/ 2>/dev/null || true
          cp ./bitnet-build/build/bin/llama-cli dist/ 2>/dev/null || true
          if [ -z "$(ls dist/ 2>/dev/null)" ]; then
            echo "WARNING: No binaries found to package. Skipping."
            exit 0
          fi
          cd dist && tar -czf ../bithub-${{ matrix.platform }}.tar.gz *

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: bithub-${{ matrix.platform }}
          path: bithub-${{ matrix.platform }}.tar.gz
          if-no-files-found: ignore

  build-wheel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build && python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: python-wheel
          path: dist/*.whl

  release:
    runs-on: ubuntu-latest
    needs: [build-wheel, build-binaries]
    if: always() && needs.build-wheel.result == 'success'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
      - name: Compute checksums
        run: |
          cd release-artifacts
          find . \( -name "*.tar.gz" -o -name "*.whl" \) -exec sha256sum {} \; > checksums.txt || true
          cat checksums.txt
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-artifacts/**/*.tar.gz
            release-artifacts/**/*.whl
            release-artifacts/checksums.txt

  publish-pypi:
    runs-on: ubuntu-latest
    needs: [build-wheel]
    environment:
      name: pypi
      url: https://pypi.org/p/bithub
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-wheel
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
